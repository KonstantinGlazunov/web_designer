name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15"
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            if ssh $SSH_OPTS ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "echo SSH OK"; then
              echo "SSH OK"
              exit 0
            fi
            sleep 10
          done
          echo "SSH connection failed after 5 attempts"
          exit 1

      - name: Prepare staging directory
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << ENDSSH
            rm -rf /home/opc/programmersites_stage
            mkdir -p /home/opc/programmersites_stage
            if [ -f /home/opc/programmersites/variables.env ]; then
              cp /home/opc/programmersites/variables.env /home/opc/programmersites_stage/variables.env
            fi
          ENDSSH

      - name: Copy files to staging
        run: |
          rsync -avz --exclude 'node_modules' --exclude '.next' --exclude '.git' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30" \
            ./ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/opc/programmersites_stage/

      - name: Build staging release
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=60 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << ENDSSH
            set -e
            cd /home/opc/programmersites_stage
            chmod +x /home/opc/programmersites_stage/deploy.sh
            export NODE_OPTIONS="--max-old-space-size=512"
            APP_DIR="/home/opc/programmersites_stage" /home/opc/programmersites_stage/deploy.sh build-only
          ENDSSH

      - name: Cut over release
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=60 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << ENDSSH
            set -e
            chmod +x /home/opc/programmersites/deploy.sh /home/opc/programmersites_stage/deploy.sh 2>/dev/null || true
            APP_DIR="/home/opc/programmersites" /home/opc/programmersites/deploy.sh stop || true
            mkdir -p /home/opc/programmersites/.next /home/opc/programmersites/public
            rsync -a --delete /home/opc/programmersites_stage/.next/ /home/opc/programmersites/.next/
            rsync -a --delete /home/opc/programmersites_stage/public/ /home/opc/programmersites/public/
            cp /home/opc/programmersites_stage/deploy.sh /home/opc/programmersites/deploy.sh
            chmod +x /home/opc/programmersites/deploy.sh
            if [ -f /home/opc/programmersites_stage/package.json ]; then cp /home/opc/programmersites_stage/package.json /home/opc/programmersites/package.json; fi
            if [ -f /home/opc/programmersites_stage/package-lock.json ]; then cp /home/opc/programmersites_stage/package-lock.json /home/opc/programmersites/package-lock.json; fi
            APP_DIR="/home/opc/programmersites" /home/opc/programmersites/deploy.sh start-only
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << ENDSSH
            APP_DIR="/home/opc/programmersites" /home/opc/programmersites/deploy.sh status || exit 1
            curl -I -s http://127.0.0.1:3000/ | head -n 1 | grep "200"
          ENDSSH
