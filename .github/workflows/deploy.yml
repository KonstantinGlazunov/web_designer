name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Test SSH connection
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "echo SSH OK"

      - name: Stop application and free memory
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            pkill -9 -f "node.*programmersites" || true
            pkill -9 -f "node.*server.js" || true
            sleep 2
            sync
            sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true
            free -h
          ENDSSH

      - name: Copy files to server
        run: |
          rsync -avz --exclude 'node_modules' --exclude '.next' --exclude '.git' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/opc/programmersites/

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            set -e
            APP_DIR="/home/opc/programmersites"
            cd "$APP_DIR"
            chmod +x deploy.sh
            export NODE_OPTIONS="--max-old-space-size=512"
            ./deploy.sh deploy
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            /home/opc/programmersites/deploy.sh status || exit 1
          ENDSSH
